server {
    listen 80;
    server_name schedulerlite-api.eascadesk.ie;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name schedulerlite-api.eascadesk.ie;

    ssl_certificate     /certs/api_eascadesk_ie.pem;
    ssl_certificate_key /certs/api_eascadesk_ie.key;

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
